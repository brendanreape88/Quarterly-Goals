<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living from Love</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0e0c; color: #f0ead8; font-family: Georgia, serif; }
#status { padding: 20px; font-size: 13px; font-family: system-ui, sans-serif; color: #8a8070; line-height: 2; }
#status .ok { color: #7a9e87; }
#status .err { color: #c47b6a; }
</style>
</head>
<body>
<div id="status">Loading...</div>

<script>
var log = function(msg, ok) {
  var d = document.getElementById('status');
  var line = document.createElement('div');
  line.className = ok === false ? 'err' : ok === true ? 'ok' : '';
  line.textContent = msg;
  d.appendChild(line);
  d.firstChild.remove && d.childNodes.length > 1 && d.childNodes[0].textContent === 'Loading...' && (d.childNodes[0].remove());
};
log('Page loaded ✓', true);
log('Checking Firebase CDN...');
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"
  onload="log('Firebase app loaded ✓', true)"
  onerror="log('Firebase app FAILED to load ✗', false)"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"
  onload="log('Firebase auth loaded ✓', true)"
  onerror="log('Firebase auth FAILED ✗', false)"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"
  onload="log('Firebase firestore loaded ✓', true)"
  onerror="log('Firebase firestore FAILED ✗', false)"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"
  onload="log('React loaded ✓', true)"
  onerror="log('React FAILED ✗', false)"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
  onload="log('ReactDOM loaded ✓', true)"
  onerror="log('ReactDOM FAILED ✗', false)"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"
  onload="log('Babel loaded ✓', true)"
  onerror="log('Babel FAILED ✗', false)"></script>

<script>
window.addEventListener('load', function() {
  log('--- Init checks ---');
  try { firebase.initializeApp({ apiKey: 'test', authDomain: 'test', projectId: 'test' }); log('Firebase init OK ✓', true); } catch(e) { log('Firebase init error: ' + e.message, false); }
  log(typeof React !== 'undefined' ? 'React available ✓' : 'React MISSING ✗', typeof React !== 'undefined');
  log(typeof ReactDOM !== 'undefined' ? 'ReactDOM available ✓' : 'ReactDOM MISSING ✗', typeof ReactDOM !== 'undefined');
  log(typeof Babel !== 'undefined' ? 'Babel available ✓' : 'Babel MISSING ✗', typeof Babel !== 'undefined');
  log('--- Done. Share a screenshot of this page ---');
});
</script>
</body>
</html>
